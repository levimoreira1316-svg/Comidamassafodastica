<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Comidas</title>

  <style>
    body {
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: white;
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255,0,0,0.3);
      width: 320px;
      text-align: center;
    }

    h1 {
      color: red;
      font-size: 70px;
      margin-bottom: 20px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .add-btn {
      background: #00c853;
      color: white;
    }

    .delete-btn {
      background: red;
      color: white;
      width: 100%;
      margin-top: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
      max-height: 200px;
      overflow-y: auto;
    }

    li {
      background: #222;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    li:hover {
      background: #333;
      transform: scale(1.02);
    }

    .info {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>comidas</h1>

    <div class="input-area">
      <input type="text" id="inputComida" placeholder="Digite...">
      <button class="add-btn" onclick="adicionar()">+</button>
    </div>

    <ul id="lista"></ul>

    <button class="delete-btn" onclick="limparLista()">Excluir tudo</button>

    <div class="info">Clique em um item para remover</div>

  </div>

  <script>
    let lista = document.getElementById("lista");
    let input = document.getElementById("inputComida");

    // Carregar lista
    window.onload = function() {
      let dados = JSON.parse(localStorage.getItem("comidas")) || [];
      dados.forEach(item => criarItem(item));
    };

    function adicionar() {
      let texto = input.value.trim();

      if (texto === "") return;

      criarItem(texto);
      salvar(texto);

      input.value = "";
    }

    function criarItem(texto) {
      let item = document.createElement("li");
      item.textContent = texto;

      item.onclick = function() {
        removerItem(texto, item);
      };

      lista.appendChild(item);
    }

    function salvar(texto) {
      let dados = JSON.parse(localStorage.getItem("comidas")) || [];
      dados.push(texto);
      localStorage.setItem("comidas", JSON.stringify(dados));
    }

    function removerItem(texto, elemento) {
      let dados = JSON.parse(localStorage.getItem("comidas")) || [];
      dados = dados.filter(item => item !== texto);
      localStorage.setItem("comidas", JSON.stringify(dados));

      elemento.remove();
    }

    function limparLista() {
      localStorage.removeItem("comidas");
      lista.innerHTML = "";
    }

    // ENTER
    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        adicionar();
      }
    });
  </script>

</body>
</html>
