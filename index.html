<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <!-- CORRIGE O ZOOM DE VERDADE -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <title>Comidas</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #000000, #111);
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      align-items: center;

      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-family: Impact, Arial Black, sans-serif; /* FORÇA UMA FONTE CHAMATIVA */
      font-size: 18vw; /* tamanho baseado na tela */
      color: red;
      margin: 20px 0;

      text-shadow:
        0 0 10px red,
        0 0 25px red,
        0 0 50px darkred,
        0 0 80px darkred;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    input {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
    }

    button {
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      font-size: 16px;
    }

    .add-btn {
      background: #00c853;
      color: white;
    }

    .delete-btn {
      background: red;
      color: white;
      width: 100%;
      margin-top: 15px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
      width: 100%;
    }

    li {
      background: #222;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .info {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <h1>comidas</h1>

  <div class="container">

    <div class="input-area">
      <input type="text" id="inputComida" placeholder="Digite...">
      <button class="add-btn" onclick="adicionar()">+</button>
    </div>

    <ul id="lista"></ul>

    <button class="delete-btn" onclick="limparLista()">Excluir tudo</button>

    <div class="info">Clique em um item para remover</div>

  </div>

  <script>
    let lista = document.getElementById("lista");
    let input = document.getElementById("inputComida");

    window.onload = function() {
      let dados = JSON.parse(localStorage.getItem("comidas")) || [];
      dados.forEach(item => criarItem(item));
    };

    function adicionar() {
      let texto = input.value.trim();
      if (texto === "") return;

      criarItem(texto);
      salvar(texto);

      input.value = "";
    }

    function criarItem(texto) {
      let item = document.createElement("li");
      item.textContent = texto;

      item.onclick = function() {
        removerItem(texto, item);
      };

      lista.appendChild(item);
    }

    function salvar(texto) {
      let dados = JSON.parse(localStorage.getItem("comidas")) || [];
      dados.push(texto);
      localStorage.setItem("comidas", JSON.stringify(dados));
    }

    function removerItem(texto, elemento) {
      let dados = JSON.parse(localStorage.getItem("comidas")) || [];
      dados = dados.filter(item => item !== texto);
      localStorage.setItem("comidas", JSON.stringify(dados));

      elemento.remove();
    }

    function limparLista() {
      localStorage.removeItem("comidas");
      lista.innerHTML = "";
    }

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        adicionar();
      }
    });
  </script>

</body>
</html>
